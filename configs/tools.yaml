default_toolset: basic_tools

settings:
  data_root: ../data

toolsets:
  basic_tools:
    - calculator
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
    - code_executor
    - text_summarizer
    - search_read_summarize
    - read_analyze_format
    - calculate_format
    - read_summarize_format

tools:
  calculator:
    module: skills.calculator
    function: calculator
    description: Calculate a safe arithmetic expression.
    parameters:
      expression:
        type: string
        description: Arithmetic expression using numbers and supported operators.
    required: [expression]
    returns:
      result:
        type: number
        description: Calculated value.

  file_reader:
    module: skills.file_reader
    function: file_reader
    description: Read a local UTF-8 txt or md file from the data directory.
    parameters:
      path:
        type: string
        description: Path relative to the configured data root.
      max_chars:
        type: integer
        description: Maximum number of characters to return.
    required: [path]
    returns:
      content: {type: string, description: File content.}
      num_chars: {type: integer, description: Returned character count.}
      source: {type: string, description: Normalized path relative to data root.}
      truncated: {type: boolean, description: Whether content was truncated.}

  local_file_search:
    module: skills.local_file_search
    function: local_file_search
    description: Search local txt and md files for query terms.
    parameters:
      query: {type: string, description: Search query.}
      root_dir: {type: string, description: Directory relative to data root.}
      file_types:
        type: array
        items: {type: string}
        description: File extensions to search.
      top_k: {type: integer, description: Maximum number of matches.}
    required: [query]
    returns:
      results: {type: array, description: "Ranked paths, snippets, and scores."}

  table_analyzer:
    module: skills.table_analyzer
    function: table_analyzer
    description: Analyze a local CSV or TSV file.
    parameters:
      path: {type: string, description: Table path relative to data root.}
      max_rows_preview: {type: integer, description: Number of preview rows.}
      describe: {type: boolean, description: Whether to calculate numeric statistics.}
    required: [path]
    returns:
      num_rows: {type: integer, description: Data row count.}
      num_columns: {type: integer, description: Column count.}
      columns: {type: array, description: Column names.}
      preview: {type: array, description: First rows.}
      describe: {type: object, description: Numeric statistics by column.}

  format_converter:
    module: skills.format_converter
    function: format_converter
    description: Convert text to markdown bullets or formatted JSON and write the converted content to a file.
    parameters:
      text: {type: string, description: Input text.}
      target_format: {type: string, description: markdown or json.}
      output_filename: {type: string, description: Optional output filename. Defaults to converted.md or converted.json.}
    required: [text, target_format]
    returns:
      formatted_text: {type: string, description: Converted text.}
      generated_file_path: {type: string, description: Path of the generated output file.}

  code_executor:
    module: skills.code_executor
    function: code_executor
    description: Execute Python code safely in a sandboxed environment.
    parameters:
      code: {type: string, description: Python code to execute.}
      timeout: {type: integer, description: Maximum execution time in seconds (1-30).}
      capture_print: {type: boolean, description: Whether to capture print output.}
    required: [code]
    returns:
      result: {type: any, description: Value of the last variable.}
      stdout: {type: string, description: Standard output.}
      stderr: {type: string, description: Standard error.}
      variables: {type: object, description: All variables created during execution.}

  text_summarizer:
    module: skills.text_summarizer
    function: text_summarizer
    description: Extract key sentences and keywords from text to generate a summary.
    parameters:
      text: {type: string, description: Input text to summarize.}
      max_sentences: {type: integer, description: Maximum number of sentences in summary.}
      max_keywords: {type: integer, description: Maximum number of keywords to extract.}
      extract_keywords: {type: boolean, description: Whether to extract keywords.}
    required: [text]
    returns:
      summary: {type: string, description: Generated summary text.}
      key_sentences: {type: array, description: Key sentences extracted from text.}
      keywords: {type: array, description: Keywords with frequency information.}
      stats: {type: object, description: Text statistics (char count, word count, etc.).}

  search_read_summarize:
    module: skills.compound
    function: search_read_summarize
    description: Search files by keyword, read the best match, and generate a summary with keywords.
    parameters:
      query: {type: string, description: Search query keywords.}
      root_dir: {type: string, description: Directory to search in (relative to data root).}
      max_sentences: {type: integer, description: Maximum summary sentences.}
    required: [query]
    returns:
      source: {type: string, description: Source file path.}
      content: {type: string, description: Full file content.}
      summary: {type: string, description: Generated summary.}
      key_sentences: {type: array, description: Key sentences.}
      keywords: {type: array, description: Extracted keywords.}

  read_analyze_format:
    module: skills.compound
    function: read_analyze_format
    description: Analyze a CSV/TSV table file and format the statistics as a report.
    parameters:
      path: {type: string, description: Table file path (relative to data root).}
      target_format: {type: string, description: "Output format: markdown, json, yaml, csv, or html."}
    required: [path]
    returns:
      report: {type: string, description: Formatted analysis report.}
      data: {type: object, description: Raw analysis data.}
      source: {type: string, description: Source file path.}

  calculate_format:
    module: skills.compound
    function: calculate_format
    description: Evaluate a math expression and format the result.
    parameters:
      expression: {type: string, description: Arithmetic expression.}
      target_format: {type: string, description: "Output format: markdown, json, yaml, csv, or html."}
    required: [expression]
    returns:
      expression: {type: string, description: Original expression.}
      result: {type: number, description: Calculated result.}
      formatted: {type: string, description: Formatted output.}

  read_summarize_format:
    module: skills.compound
    function: read_summarize_format
    description: Read a file, summarize its content, and generate a formatted report.
    parameters:
      path: {type: string, description: File path (relative to data root).}
      target_format: {type: string, description: "Output format: markdown, json, yaml, csv, or html."}
      max_sentences: {type: integer, description: Maximum summary sentences.}
    required: [path]
    returns:
      source: {type: string, description: Source file path.}
      summary: {type: string, description: Generated summary.}
      keywords: {type: array, description: Extracted keywords.}
      report: {type: string, description: Formatted report.}
